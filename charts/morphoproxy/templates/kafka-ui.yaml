apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
    spec:
      containers:
      - name: akhq
        image: tchiotludo/akhq:latest
        env:
        - name: AKHQ_CONFIGURATION
          value: |
            akhq:
              connections:
                docker-kafka:
                  properties:
                    bootstrap.servers: "kafka:{{ .Values.ports.kafka }}"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
spec:
  type: NodePort
  selector:
    app: kafka-ui
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30082 