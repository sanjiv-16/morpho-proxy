apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
      - name: keycloak
        image: {{ .Values.images.keycloak }}
        args: ["start-dev"]
        env:
        - name: KEYCLOAK_ADMIN
          value: {{ .Values.config.keycloakAdminUser | quote }}
        - name: KEYCLOAK_ADMIN_PASSWORD
          value: {{ .Values.config.keycloakAdminPass | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
spec:
  type: NodePort
  selector:
    app: keycloak
  ports:
  - port: {{ .Values.ports.keycloak }}
    targetPort: {{ .Values.ports.keycloakInternal }}
    nodePort: {{ .Values.nodePorts.keycloak }}