apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
      - name: keycloak
        image: {{ .Values.images.keycloak }}
        args: ["start-dev", "--import-realm"]
        env:
        - name: KC_BOOTSTRAP_ADMIN_USERNAME
          value: {{ .Values.config.keycloakAdminUser | quote }}
        - name: KC_BOOTSTRAP_ADMIN_PASSWORD
          value: {{ .Values.config.keycloakAdminPass | quote }}
        - name: KC_HOSTNAME
          value: {{ .Values.global.externalDomain | quote }}
        - name: KC_HOSTNAME_PORT
          value: {{ .Values.nodePorts.keycloak | quote }}
        - name: KC_HOSTNAME_STRICT
          value: "false"
        - name: KC_HTTP_RELATIVE_PATH
          value: "/"
        ports:
        - containerPort: {{ .Values.ports.keycloakInternal }}
        volumeMounts:
        - name: realm-config
          mountPath: /opt/keycloak/data/import
      volumes:
      - name: realm-config
        configMap:
          name: keycloak-realm-config
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
spec:
  type: NodePort
  selector:
    app: keycloak
  ports:
  - port: {{ .Values.ports.keycloak }}
    targetPort: {{ .Values.ports.keycloakInternal }}
    nodePort: {{ .Values.nodePorts.keycloak }}