apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-cluster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      enableServiceLinks: false
      containers:
      - name: zookeeper
        image: {{ .Values.images.zookeeper }}
        env:
        - name: ZOOKEEPER_CLIENT_PORT
          value: "{{ .Values.ports.zookeeper }}"
      - name: kafka
        image: {{ .Values.images.kafka }}
        env:
        - name: KAFKA_PROCESS_ROLES
          value: ""
        - name: KAFKA_ENABLE_KRAFT
          value: "false"
        - name: KAFKA_ZOOKEEPER_CONNECT
          value: "localhost:{{ .Values.ports.zookeeper }}"
        - name: KAFKA_ADVERTISED_LISTENERS
          value: "PLAINTEXT://kafka:{{ .Values.ports.kafka }}"
        - name: KAFKA_LISTENERS
          value: "PLAINTEXT://0.0.0.0:{{ .Values.ports.kafka }}"
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "PLAINTEXT:PLAINTEXT"
        - name: KAFKA_INTER_BROKER_LISTENER_NAME
          value: "PLAINTEXT"
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
spec:
  selector:
    app: kafka
  ports:
  - port: {{ .Values.ports.kafka }}