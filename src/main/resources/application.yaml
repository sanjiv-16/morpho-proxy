server:
  port: ${APP_PORT:8080}

spring:
  application:
    name: ${APP_NAME:morpho-proxy}
  
  # Redis configuration for Rate Limiting
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Kafka configuration for Telemetry
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # Security configuration for OpenID Connect
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI:http://localhost:8081/realms/morpho}

  # Gateway Routing Rules
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH:50}
                redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST:100}
                key-resolver: "#{@ipKeyResolver}"
            - name: KafkaTelemetryFilter

          routes:
            - id: ${CANARY_ROUTE_ID:modern_canary_route}
              uri: ${MODERN_URI:http://modern-microservice:8080}
              predicates:
                - Path=${ROUTE_PATH:/api/**}
                - Weight=${WEIGHT_GROUP:migration_group}, ${CANARY_PERCENTAGE:10}
              filters:
                - name: AddRequestHeader
                  args:
                    name: ${ROUTED_BY_HEADER:X-Routed-By}
                    value: ${CANARY_ROUTED_BY_VALUE:canary-modern}

            - id: ${LEGACY_ROUTE_ID:legacy_route}
              uri: ${LEGACY_URI:http://legacy-monolith:8080}
              predicates:
                - Path=${ROUTE_PATH:/api/**}
                - Weight=${WEIGHT_GROUP:migration_group}, ${LEGACY_PERCENTAGE:90}
              filters:
                - name: AddRequestHeader
                  args:
                    name: ${ROUTED_BY_HEADER:X-Routed-By}
                    value: ${LEGACY_ROUTED_BY_VALUE:legacy}
                - name: ShadowTrafficFilter
                  args:
                    shadowUri: ${MODERN_URI:http://modern-microservice:8080}
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    org.springframework.cloud.gateway: ${LOG_LEVEL_GATEWAY:DEBUG}
    org.springframework.cloud.gateway.server: ${LOG_LEVEL_GATEWAY:DEBUG}
    org.springframework.cloud.gateway.server.webflux: ${LOG_LEVEL_GATEWAY:DEBUG}
    org.springframework.cloud.gateway.route: ${LOG_LEVEL_GATEWAY:DEBUG}
    org.springframework.cloud.gateway.filter: ${LOG_LEVEL_GATEWAY:DEBUG}
    com.morphoproxy: ${LOG_LEVEL_APP:DEBUG}
    reactor.netty: ${LOG_LEVEL_NETTY:DEBUG}
    reactor.netty.http.server: ${LOG_LEVEL_NETTY:DEBUG}
    reactor.netty.http.server.AccessLog: ${LOG_LEVEL_NETTY:DEBUG}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"